{% extends 'base.html' %}
{% load static %}

{% block title %}Login - JobFlow{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card fade-in">
    <div class="auth-header">
      <div class="icon">🔐</div>
      <h2>Welcome Back!</h2>
      <p>Sign in to continue your job search</p>
    </div>

    <!-- Alert Container -->
    <div id="alertContainer"></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-input" placeholder="Enter your username" required>
      </div>
      
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
      </div>
      
      <div class="flex justify-between items-center mb-3">
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
          <input type="checkbox" id="remember" style="width: 18px; height: 18px; accent-color: var(--primary);">
          <span style="font-size: 0.9rem; color: var(--gray-600);">Remember me</span>
        </label>
        <a href="#" style="font-size: 0.9rem; color: var(--primary); font-weight: 500;">Forgot password?</a>
      </div>
      
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">
        🚀 Sign In
      </button>
    </form>

    <div class="auth-divider">or continue with</div>

    <div class="flex gap-2">
      <button class="btn btn-secondary" style="flex: 1;">
        🔵 Google
      </button>
      <button class="btn btn-secondary" style="flex: 1;">
        ⚫ GitHub
      </button>
    </div>

    <div class="auth-footer">
      Don't have an account? <a href="{% url 'register' %}">Create one free</a>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById("loginForm").onsubmit = async (e) => {
  e.preventDefault();
  
  const submitBtn = document.getElementById("submitBtn");
  const alertContainer = document.getElementById("alertContainer");
  
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<div class="spinner" style="width: 20px; height: 20px; border-width: 2px; margin-right: 10px;"></div> Signing in...';
  alertContainer.innerHTML = "";

  try {
    const res = await fetch("/api/auth/login/", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        username: document.getElementById("username").value,
        password: document.getElementById("password").value
      })
    });

    const data = await res.json();
    
    if (res.ok) {
      localStorage.setItem("token", data.access);
      if (data.refresh) localStorage.setItem("refreshToken", data.refresh);
      
      showToast("Login successful! Redirecting...");
      setTimeout(() => window.location.href = "{% url 'jobs' %}", 1000);
    } else {
      alertContainer.innerHTML = `
        <div class="alert alert-error">
          ❌ ${data.detail || 'Invalid username or password'}
        </div>
      `;
    }
  } catch (err) {
    alertContainer.innerHTML = `
      <div class="alert alert-error">
        ❌ Network error. Please check your connection.
      </div>
    `;
  } finally {
    submitBtn.disabled = false;
    submitBtn.innerHTML = '🚀 Sign In';
  }
};
</script>
{% endblock %}
